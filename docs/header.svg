<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <rect width="900" height="200" fill="#ffffff"/>
  
  <!-- Top rule (double line like LaTeX) -->
  <line x1="40" y1="20" x2="860" y2="20" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="40" y1="24" x2="860" y2="24" stroke="#1a1a1a" stroke-width="0.4"/>
  
  <!-- Authors in small caps style -->
  <text x="48" y="52" fill="#1a1a1a" font-family="Georgia, 'Times New Roman', serif" font-size="10" letter-spacing="2">CORMEN · LEISERSON · RIVEST · STEIN</text>
  
  <!-- Title in classic LaTeX Computer Modern style -->
  <text x="48" y="90" fill="#1a1a1a" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="400">Introduction to Algorithms</text>
  
  <!-- Subtitle -->
  <text x="48" y="115" fill="#6b6b6b" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-style="italic">Projects with empirical complexity proofs</text>
  
  <!-- Thin rule -->
  <line x1="48" y1="128" x2="480" y2="128" stroke="#d1d1d1" stroke-width="0.5"/>
  
  <!-- Methodology in theorem-style -->
  <text x="48" y="148" fill="#1a1a1a" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="700">Methodology.</text>
  <text x="130" y="148" fill="#4a4a4a" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-style="italic">Feel the naive approach fail; read the theory; implement with</text>
  <text x="48" y="163" fill="#4a4a4a" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-style="italic">operation counters; benchmark empirically. If 2n → 4 ops, then T(n) = O(n²).  ∎</text>
  
  <!-- Right side: complexity notation sketch -->
  <g transform="translate(640, 38)">
    <!-- A hand-drawn-ish graph of growth rates -->
    <line x1="0" y1="100" x2="170" y2="100" stroke="#1a1a1a" stroke-width="0.6"/>
    <line x1="0" y1="0" x2="0" y2="100" stroke="#1a1a1a" stroke-width="0.6"/>
    
    <!-- n label -->
    <text x="170" y="115" font-family="Georgia, serif" font-size="9" font-style="italic" fill="#6b6b6b">n</text>
    <!-- T(n) label -->
    <text x="-5" y="-5" font-family="Georgia, serif" font-size="9" font-style="italic" fill="#6b6b6b">T(n)</text>
    
    <!-- O(n) - linear -->
    <path d="M2,95 L160,25" fill="none" stroke="#4a4a4a" stroke-width="0.8"/>
    <text x="162" y="22" font-family="Georgia, serif" font-size="8" font-style="italic" fill="#4a4a4a">n</text>
    
    <!-- O(n log n) -->
    <path d="M2,97 Q60,60 160,12" fill="none" stroke="#8b4513" stroke-width="1"/>
    <text x="162" y="9" font-family="Georgia, serif" font-size="8" font-style="italic" fill="#8b4513">n lg n</text>
    
    <!-- O(n²) -->
    <path d="M2,99 Q40,90 80,60 Q120,20 145,2" fill="none" stroke="#991b1b" stroke-width="1"/>
    <text x="148" y="0" font-family="Georgia, serif" font-size="8" font-style="italic" fill="#991b1b">n²</text>
    
    <!-- O(lg n) -->
    <path d="M2,96 Q30,78 60,72 Q100,66 160,60" fill="none" stroke="#2f4f4f" stroke-width="0.8"/>
    <text x="162" y="58" font-family="Georgia, serif" font-size="8" font-style="italic" fill="#2f4f4f">lg n</text>
    
    <!-- Caption -->
    <text x="85" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#999">measured, not assumed</text>
  </g>
  
  <!-- Bottom rule (double line) -->
  <line x1="40" y1="175" x2="860" y2="175" stroke="#1a1a1a" stroke-width="0.4"/>
  <line x1="40" y1="179" x2="860" y2="179" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <!-- Footer -->
  <text x="48" y="195" fill="#999" font-family="Georgia, 'Times New Roman', serif" font-size="9" letter-spacing="1">11 CHAPTERS · 60 TESTS PER PROJECT</text>
  <text x="860" y="195" text-anchor="end" fill="#999" font-family="Georgia, 'Times New Roman', serif" font-size="9" font-style="italic">context matters</text>
</svg>
