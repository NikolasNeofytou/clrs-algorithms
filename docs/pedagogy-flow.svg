<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>
  
  <text x="450" y="32" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" font-weight="500" letter-spacing="3">LEARNING METHODOLOGY</text>
  
  <!-- Phase 1: Feel the Slowness -->
  <rect x="60" y="50" width="220" height="100" rx="8" fill="#1c1917" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="170" y="75" text-anchor="middle" fill="#fcd34d" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">PHASE 1</text>
  <text x="170" y="100" text-anchor="middle" fill="#fef3c7" font-family="Georgia, serif" font-size="19" font-weight="700">Feel the Slowness</text>
  <text x="170" y="120" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="11">Run the naive approach</text>
  <text x="170" y="135" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="11">and watch it choke</text>
  
  <!-- Arrow 1→2 -->
  <line x1="290" y1="100" x2="330" y2="100" stroke="#d97706" stroke-width="2" filter="url(#glow)"/>
  <polygon points="330,95 342,100 330,105" fill="#d97706"/>
  
  <!-- Phase 2: Read the Theory -->
  <rect x="350" y="50" width="200" height="100" rx="8" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="450" y="75" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">PHASE 2</text>
  <text x="450" y="100" text-anchor="middle" fill="#ede9fe" font-family="Georgia, serif" font-size="19" font-weight="700">Read the Theory</text>
  <text x="450" y="120" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="11">Connect the pain to</text>
  <text x="450" y="135" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="11">the chapter's algorithm</text>

  <!-- Arrow 2→3 -->
  <line x1="560" y1="100" x2="600" y2="100" stroke="#7c3aed" stroke-width="2" filter="url(#glow)"/>
  <polygon points="600,95 612,100 600,105" fill="#7c3aed"/>
  
  <!-- Phase 3: Build & Benchmark -->
  <rect x="620" y="50" width="220" height="100" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
  <text x="730" y="75" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">PHASE 3</text>
  <text x="730" y="100" text-anchor="middle" fill="#dcfce7" font-family="Georgia, serif" font-size="19" font-weight="700">Build &amp; Prove</text>
  <text x="730" y="120" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="11">Implement, count operations</text>
  <text x="730" y="135" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="11">and benchmark empirically</text>

  <!-- Bottom tagline -->
  <text x="450" y="180" text-anchor="middle" fill="#64748b" font-family="Georgia, serif" font-size="13" font-style="italic">Don't just implement — prove. Double the input, measure the slowdown.</text>
</svg>
