<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 80">
  <rect width="900" height="80" fill="#ffffff"/>
  
  <line x1="40" y1="10" x2="860" y2="10" stroke="#d1d1d1" stroke-width="0.5"/>
  
  <g font-family="Georgia, 'Times New Roman', serif" transform="translate(0, 44)">
    <text x="48" y="0" fill="#1a1a1a" font-size="11" font-weight="700">Phase 1.</text>
    <text x="112" y="0" fill="#4a4a4a" font-size="11" font-style="italic">Run the naive approach.</text>
    
    <text x="288" y="0" fill="#999" font-size="11">→</text>
    
    <text x="310" y="0" fill="#1a1a1a" font-size="11" font-weight="700">Phase 2.</text>
    <text x="374" y="0" fill="#4a4a4a" font-size="11" font-style="italic">Read the chapter.</text>
    
    <text x="510" y="0" fill="#999" font-size="11">→</text>
    
    <text x="532" y="0" fill="#1a1a1a" font-size="11" font-weight="700">Phase 3.</text>
    <text x="596" y="0" fill="#4a4a4a" font-size="11" font-style="italic">Implement, count, benchmark.</text>
  </g>
  
  <text x="860" y="62" text-anchor="end" fill="#999" font-family="Georgia, serif" font-size="9" font-style="italic">Double the input. Measure the slowdown. That's your proof.</text>
  
  <line x1="40" y1="70" x2="860" y2="70" stroke="#d1d1d1" stroke-width="0.5"/>
